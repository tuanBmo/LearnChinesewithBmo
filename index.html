<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Minimal Bento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="menuScreen" class="screen active">
        <div class="bento-layout">
            
            <header class="bento-box bento-header">
                <div class="logo">
                    <div class="logo-mark">汉</div>
                    <div class="logo-text">HSK Club.</div>
                </div>
                <div class="user-stats">
                    <span class="stat"><i class='bx bx-flame'></i> 1</span>
                    <span class="stat"><i class='bx bx-star'></i> 322</span>
                    <div class="avatar"></div>
                </div>
            </header>

            <div class="bento-box bento-hero">
                <div class="hero-top">
                    <h2>Thiết lập ván mới</h2>
                    <p>Chọn lộ trình để bắt đầu ôn tập.</p>
                </div>
                
                <div class="config-section">
                    <span class="config-label">Level</span>
                    <div id="levelGrid" class="pill-group"></div>
                </div>

                <div class="config-section">
                    <span class="config-label">Chế độ</span>
                    <div class="pill-group">
                        <button class="mode-btn active" data-mode="NGHĨA">Nghĩa</button>
                        <button class="mode-btn" data-mode="PINYIN">Pinyin</button>
                        <button class="mode-btn" data-mode="CHỮ HÁN">Chữ Hán</button>
                    </div>
                </div>

                <button id="btnStart" class="btn-primary">Bắt Đầu Trải Nghiệm <i class='bx bx-right-arrow-alt'></i></button>
            </div>

            <div class="bento-box bento-settings">
                <h3>Cấu hình</h3>
                <div class="setting-list">
                    <label class="toggle-row">
                        <span>Trộn câu hỏi</span>
                        <input type="checkbox" id="settingRandom" checked>
                        <div class="toggle-slider"></div>
                    </label>
                    <label class="toggle-row">
                        <span>Hiện Pinyin</span>
                        <input type="checkbox" id="settingPinyin" checked>
                        <div class="toggle-slider"></div>
                    </label>
                    <label class="toggle-row">
                        <span>Hiện Ví dụ</span>
                        <input type="checkbox" id="settingExample">
                        <div class="toggle-slider"></div>
                    </label>
                </div>
            </div>

            <div class="bento-box feature feature-1">
                <i class='bx bx-book-open'></i>
                <h4>Từ Vựng</h4>
                <p>11k+ flashcard</p>
            </div>
            <div class="bento-box feature feature-2">
                <i class='bx bx-headphone'></i>
                <h4>Luyện Nghe</h4>
                <p>Shadowing</p>
            </div>
            <div class="bento-box feature feature-3">
                <i class='bx bx-bar-chart-alt-2'></i>
                <h4>Tiến Độ</h4>
                <p>Phân tích chi tiết</p>
            </div>

        </div>
    </main>

    <main id="gameScreen" class="screen">
        <div class="bento-game-layout">
            
            <div class="bento-box game-hud">
                <div id="hpDisplay" class="hp-hearts">❤️❤️❤️❤️❤️</div>
                <div id="progressText" class="progress-info">0/0</div>
                <button class="btn-exit" onclick="location.reload()"><i class='bx bx-x'></i> Thoát</button>
            </div>

            <div class="bento-box flashcard">
                <span class="lvl-badge" id="lvlBadge">HSK</span>
                <div class="main-q" id="mainQuestion">你好</div>
                <div class="sub-q" id="subQuestion">nǐ hǎo</div>
                <div class="example-text" id="exampleText"></div>
            </div>

            <div class="answer-grid" id="answerContainer">
                </div>

        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
